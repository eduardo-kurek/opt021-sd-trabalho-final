<p-panel>
    <ng-template #header>
        <h1>Nova roteirização</h1>
    </ng-template>
    
    <form [formRoot]="routingForm">
        <div>
            <p-floatlabel>
                <input pInputText id="name" autocomplete="off" [formField]="routingForm.name" />
                <label for="name">Nome do roteiro</label>
            </p-floatlabel>
        </div>

        <p>Vagas: <p-button size="small" icon="pi pi-plus" (click)="addSlot()" /> </p>

        @for (slot of routingForm.slots; track $index) {
            <div>
                <p>
                    Vaga {{ $index + 1 }} 
                    <input pInputText type="number" autocomplete="off" [formField]="routingForm.slots[$index].servicesQt" />
                </p>
                
            </div>
        }

        

        <div style="margin-top: 1rem">
            <p-button label="Criar roteiro" type="submit" />
        </div>    
    </form>
</p-panel>
